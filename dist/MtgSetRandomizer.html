<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTG Set Randomizer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
      text-align: center;
    }

    textarea {
      width: 100%;
      height: 90px;
      margin: 10px 0;
    }

    select, button {
      margin: 5px;
      padding: 8px;
    }

    img {
      width: 100px;
      height: 100px;
      margin-top: 20px;
    }

    #info {
      margin-top: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <h1>MTG Set Randomizer</h1>

  <p>Enter set codes separated by commas, spaces, or new lines:</p>

  <textarea id="setCodes">khm, neo, dmu</textarea>

  <div>
    <select id="setDropdown">
      <option>Loading sets...</option>
    </select>

    <button id="addSetButton" disabled>Add Set</button>
    <button id="clearButton">Clear List</button>
  </div>

  <button id="randomButton">Get Random Set Icon</button>

  <div>
    <img id="setIcon" alt="" style="display: none;" />
    <div id="info">Enter set codes, then click the button</div>
  </div>

  <script>
    const allowedSetTypes = new Set(["expansion", "masters", "core"]);

    const setCodesText = document.getElementById("setCodes");
    const setDropdown = document.getElementById("setDropdown");
    const addSetButton = document.getElementById("addSetButton");
    const clearButton = document.getElementById("clearButton");
    const randomButton = document.getElementById("randomButton");
    const setIcon = document.getElementById("setIcon");
    const info = document.getElementById("info");

    let dropdownSetsByDisplayName = {};

    async function loadAvailableSets() {
      try {
        const response = await fetch("https://api.scryfall.com/sets", {
          headers: {
            "Accept": "application/json"
          }
        });

        if (!response.ok) {
          throw new Error("Failed to load sets.");
        }

        const data = await response.json();

        const availableSets = data.data
          .filter(set => allowedSetTypes.has(set.set_type))
          .map(set => ({
            name: set.name,
            code: set.code.toLowerCase(),
            displayName: `${set.name} (${set.code.toUpperCase()})`
          }));

        setDropdown.innerHTML = "";
        dropdownSetsByDisplayName = {};

        for (const set of availableSets) {
          dropdownSetsByDisplayName[set.displayName] = set.code;

          const option = document.createElement("option");
          option.value = set.displayName;
          option.textContent = set.displayName;
          setDropdown.appendChild(option);
        }

        addSetButton.disabled = availableSets.length === 0;
      } catch (error) {
        setDropdown.innerHTML = `<option>Failed to load sets</option>`;
        addSetButton.disabled = true;
        alert(`Failed to load set list:\n${error.message}`);
      }
    }

    function getValidSetCodes() {
      return setCodesText.value
        .split(/[\s,]+/)
        .map(code => code.trim().toLowerCase())
        .filter(code => /^[a-z0-9]{2,6}$/.test(code));
    }

    function getRandomSetCodeFromInput() {
      const validSetCodes = getValidSetCodes();

      if (validSetCodes.length === 0) {
        alert(
          "Please enter at least one valid set code.\n\n" +
          "Examples: khm, neo, dmu, 40k"
        );
        return null;
      }

      const randomIndex = Math.floor(Math.random() * validSetCodes.length);
      return validSetCodes[randomIndex];
    }

    addSetButton.addEventListener("click", () => {
      const selectedDisplayName = setDropdown.value;
      const selectedCode = dropdownSetsByDisplayName[selectedDisplayName];

      if (!selectedCode) {
        return;
      }

      const currentCodes = new Set(getValidSetCodes());

      if (currentCodes.has(selectedCode)) {
        alert(`${selectedCode.toUpperCase()} is already in the list.`);
        return;
      }

      if (setCodesText.value.trim()) {
        setCodesText.value += `, ${selectedCode}`;
      } else {
        setCodesText.value = selectedCode;
      }
    });

    clearButton.addEventListener("click", () => {
      setCodesText.value = "";
    });

    randomButton.addEventListener("click", async () => {
      const randomSetCode = getRandomSetCodeFromInput();

      if (!randomSetCode) {
        return;
      }

      randomButton.disabled = true;
      info.textContent = "Loading...";
      setIcon.style.display = "none";
      setIcon.removeAttribute("src");

      try {
        const response = await fetch(
          `https://api.scryfall.com/sets/${randomSetCode}`,
          {
            headers: {
              "Accept": "application/json"
            }
          }
        );

        if (response.status === 404) {
          throw new Error("Set code not found. Please check the code and try again.");
        }

        if (!response.ok) {
          throw new Error("Failed to fetch set data.");
        }

        const setData = await response.json();

        if (!setData.icon_svg_uri) {
          throw new Error("No icon found for this set.");
        }

        setIcon.src = setData.icon_svg_uri;
        setIcon.alt = `${setData.name} icon`;
        setIcon.style.display = "inline-block";

        info.innerHTML = `
          ${setData.name}<br>
          Code: ${setData.code.toUpperCase()}
        `;
      } catch (error) {
        alert(`Something went wrong:\n${error.message}`);
        info.textContent = "Enter set codes, then click the button";
      } finally {
        randomButton.disabled = false;
      }
    });

    loadAvailableSets();
  </script>
</body>
</html>
